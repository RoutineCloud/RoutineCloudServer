version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: routine-cloud-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-routine_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-routine_cloud}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-["localhost","127.0.0.1"]}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-["http://localhost","http://127.0.0.1"]}
      - OIDC_ISSUER=${OIDC_ISSUER}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_JWKS_URL=${OIDC_JWKS_URL}
    volumes:
      - backend_data:/app/data
    networks:
      - routine-cloud-network

  db:
    image: postgres:16-alpine
    container_name: routine-cloud-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-routine_cloud}
      - POSTGRES_USER=${POSTGRES_USER:-routine_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - routine-cloud-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: routine-cloud-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - BACKEND_HOSTNAME=${BACKEND_HOSTNAME:-backend:8000}
      - VITE_OIDC_ISSUER=${VITE_OIDC_ISSUER}
      - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    networks:
      - routine-cloud-network

networks:
  routine-cloud-network:
    name: routine-cloud-network
    driver: bridge

volumes:
  backend_data:
    name: routine-cloud-backend-data
  db_data:
    name: routine-cloud-db-data