version: '3.8'

services:
  backend:
    image: ghcr.io/routinecloud/server_backend:latest
    container_name: routine-cloud-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-routine_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-routine_cloud}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    depends_on:
      - db
    volumes:
      - backend_data:/app/data
    networks:
      - routine-cloud-network

  db:
    image: postgres:16-alpine
    container_name: routine-cloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-routine_cloud}
      - POSTGRES_USER=${POSTGRES_USER:-routine_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - routine-cloud-network

  frontend:
    image: ghcr.io/routinecloud/server_frontend:latest
    container_name: routine-cloud-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - BACKEND_HOSTNAME=${BACKEND_HOSTNAME:-backend:8000}
    depends_on:
      - backend
    networks:
      - routine-cloud-network

networks:
  routine-cloud-network:
    name: routine-cloud-network
    driver: bridge

volumes:
  backend_data:
    name: routine-cloud-backend-data
  db_data:
    name: routine-cloud-db-data